<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Metalúrgica</title>
    <link rel="stylesheet" href="style.css">

    <!-- Librería para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <h1>🧪 Calculadora Metalúrgica</h1>

    <label>Ley de Cabeza (%)</label>
    <input type="number" id="cabeza">

    <label>Ley de Concentrado (%)</label>
    <input type="number" id="concentrado">

    <label>Tonelaje (ton)</label>
    <input type="number" id="tonelaje">

    <button onclick="calcular()">Calcular</button>
    <button onclick="limpiar()" class="btn-limpiar">Limpiar</button>

    <div id="resultado"></div>

    <!-- Gráfico -->
    <canvas id="grafico"></canvas>

</div>

<script src="script.js"></script>
</body>
</html>
