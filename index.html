<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador Metalúrgico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>⛏️ Simulador Metalúrgico</h1>

    <h3>🧪 Elemento</h3>
    <select id="elemento" onchange="cargarProcesos()">
        <option value="">Seleccionar</option>
        <option value="Cu">Cobre</option>
        <option value="Ca">Caliza</option>
        <option value="Na">Sal</option>
    </select>

    <h3>⚙️ Proceso</h3>
    <select id="proceso" onchange="mostrarInputs()">
        <option value="">Selecciona proceso</option>
    </select>

    <div id="inputs"></div>

    <button onclick="calcular()">Calcular</button>
    <button onclick="limpiar()" class="btn-limpiar">Limpiar</button>

    <div id="resultado"></div>

    <hr>

    <h3>🔄 Conversor</h3>
    <input type="number" id="valor">
    <select id="unidad">
        <option value="porcentaje">% </option>
        <option value="ppm">ppm</option>
    </select>
    <button onclick="convertir()">Convertir</button>

    <div id="conversion"></div>
</div>

<script src="script.js"></script>
</body>
</html>
